<!DOCTYPE html>
<html lang="en-us">
<head>

<title>Sankey</title>
<link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">

<link type="text/css" rel="stylesheet" href="/localsite/css/base.css" id="/localsite/css/base.css" />
<script type="text/javascript" src="/localsite/js/localsite.js?showheader=true"></script>

<body>
<!-- .large-list is used for numbers in span tags for .num and .txt -->
<div class="content contentpadding large-list">
  <div id="readmeDiv"></div>

  TO DO: Wait for #sankey-controls to be aded to DOM.
  
  <div id="sankey-top"></div>
  <div id="sankey-chart"></div>
</div>

<script>
fetch("index.html")
  .then(r => r.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, "text/html");
    document.getElementById("sankey-top").innerHTML = doc.body.innerHTML;
  });
</script>
</body>
