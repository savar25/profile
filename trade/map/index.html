    <style>
        body { margin: 0; font-family: sans-serif; }

        #map {
            position: relative;
            height: 100vh;
            width: 100%;
        }

        /* Smooth opacity/stroke transitions on all arrows */
        .arrow {
            fill: none;
            stroke-linecap: round;
            pointer-events: all;
            cursor: default !important;
            transition: opacity 0.18s ease, stroke-width 0.18s ease;
            will-change: opacity;
        }

        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            z-index: 1000;
            min-width: 200px;
            max-width: 280px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .control-panel h4 {
            margin: 0 0 8px;

        }
        .control-panel label {

            margin-bottom: 4px;

            display: flex;
            align-items: center;
            gap: 5px;

            border-radius: 3px;

        #source-filters label:hover {

            background: #e8f0ff;

            fill: #222;

        #flow-toggle {

<body>

<script>
// ---------------------------------------------------------------------------
// Country coordinates [lon, lat]
// ---------------------------------------------------------------------------
const COORDS = {
    US: [-99.9018, 37.0902], CN: [104.1954, 35.8617], DE: [10.4515,  51.1657],
    IN: [78.9629,  20.5937], RU: [105.3188, 61.5240], CA: [-96.8,    56.1   ],
    JP: [138.2529, 36.2048], GB: [-3.4359,  55.3781], FR: [2.2137,   46.2276],
    BR: [-51.9253, -14.235], AU: [133.7751, -25.274], MX: [-102.553, 23.6345],
    KR: [127.7669, 35.9078], IT: [12.5674,  41.8719], ES: [-3.7492,  40.4637],
    NL: [5.2913,   52.1326], SA: [45.0792,  23.8859], ZA: [22.9375,  -30.560],
    AR: [-63.617,  -38.416], TR: [35.2433,  38.9637], ID: [113.921,  -0.7893],
    PL: [19.1451,  51.9194], BE: [4.4699,   50.5039], SE: [18.6435,  60.1282],
    NO: [8.4689,   60.4720], CH: [8.2275,   46.8182], AT: [14.5501,  47.5162],
    CZ: [15.4730,  49.8175], FI: [25.7482,  61.9241], DK: [9.5018,   56.2639],
    TW: [120.960,  23.6978], TH: [100.993,  15.8700], MY: [109.698,  4.21050],
    SG: [103.820,  1.35210], PH: [121.774,  12.8797], VN: [108.277,  14.0583],
    NG: [8.6753,   9.08200], EG: [30.8025,  26.8206], GR: [21.8243,  39.0742],
    PT: [-8.2245,  39.3999], HU: [19.5033,  47.1625], RO: [24.9668,  45.9432],
    WM: [20,       15     ],
};

const COUNTRY_NAMES = {
    US: "United States", CN: "China",          DE: "Germany",
    IN: "India",         RU: "Russia",         CA: "Canada",
    JP: "Japan",         GB: "United Kingdom", FR: "France",
    BR: "Brazil",        AU: "Australia",      MX: "Mexico",
    KR: "South Korea",   IT: "Italy",          ES: "Spain",
    NL: "Netherlands",   SA: "Saudi Arabia",   ZA: "South Africa",
    AR: "Argentina",     TR: "Turkey",         ID: "Indonesia",
    PL: "Poland",        BE: "Belgium",        SE: "Sweden",
    NO: "Norway",        CH: "Switzerland",    AT: "Austria",
    CZ: "Czech Republic",FI: "Finland",        DK: "Denmark",
    TW: "Taiwan",        TH: "Thailand",       MY: "Malaysia",
    SG: "Singapore",     PH: "Philippines",    VN: "Vietnam",
    NG: "Nigeria",       EG: "Egypt",          GR: "Greece",
    PT: "Portugal",      HU: "Hungary",        RO: "Romania",
};

function countryLabel(code) { return COUNTRY_NAMES[code] || code; }

function fmtCO2(val) {
    if (val >= 1e15) return (val / 1e15).toFixed(2) + " Tt CO\u2082";
    if (val >= 1e12) return (val / 1e12).toFixed(2) + " Gt CO\u2082";
    if (val >= 1e9)  return (val / 1e9).toFixed(2)  + " Mt CO\u2082";
    return val.toExponential(2) + " CO\u2082";
}

const DEFAULT_MAP_ZOOM = 2;
const INITIAL_MAP_CENTER = [20, -55];
const PACIFIC_ROUTE_MIN_LON = 70;
const COUNTRY_CENTER_OFFSET_FACTOR = 0.26;
const BALANCE_NEGATIVE_DARK = "#c96256";
const BALANCE_NEGATIVE_LIGHT = "#f3c6bf";
const BALANCE_POSITIVE_DARK = "#0f6b57";
const BALANCE_POSITIVE_LIGHT = "#bfe3d1";

// ---------------------------------------------------------------------------
// Map setup
// ---------------------------------------------------------------------------
const map = L.map("map", {
    scrollWheelZoom: false,
    zoomSnap: 1,
}).setView(INITIAL_MAP_CENTER, DEFAULT_MAP_ZOOM);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "\u00a9 OpenStreetMap contributors | Data: EXIOBASE 3 / ModelEarth",
}).addTo(map);

L.svg().addTo(map);
const svg = d3.select("#map").select("svg");
const g   = svg.append("g");

const colorScale = d3.scaleOrdinal(d3.schemeTableau10);
const zoomToast = document.getElementById("zoom-toast");
let zoomToastTimer = null;

L.DomEvent.disableClickPropagation(document.querySelector(".control-panel"));
L.DomEvent.disableScrollPropagation(document.querySelector(".control-panel"));
L.DomEvent.disableClickPropagation(document.getElementById("map-legend"));
L.DomEvent.disableScrollPropagation(document.getElementById("map-legend"));

function showZoomToast(enabled) {
    zoomToast.textContent = enabled ? "Zoom On" : "Zoom Off";
    zoomToast.classList.add("visible");

    if (zoomToastTimer) {
        clearTimeout(zoomToastTimer);
    }
    zoomToastTimer = setTimeout(() => {
        zoomToast.classList.remove("visible");
        zoomToastTimer = null;
    }, 2000);
}

function setScrollZoom(enabled) {
    if (enabled) {
        map.scrollWheelZoom.enable();
    } else {
        map.scrollWheelZoom.disable();
    }
    showZoomToast(enabled);
}

function clickShouldToggleZoom(evt) {
    const target = evt.originalEvent?.target;
    if (!(target instanceof Element)) return false;
    const mapObjectRoot = g.node();

    if (mapObjectRoot && mapObjectRoot.contains(target) && target !== mapObjectRoot) {
        return false;
    }

    return !target.closest([
        ".control-panel",
        "#map-legend",
        "#map-tooltip",
        "#zoom-toast",
        ".leaflet-marker-icon",
        ".leaflet-popup",
        ".leaflet-tooltip",
        ".leaflet-interactive",
    ].join(","));
}

// ---------------------------------------------------------------------------
// CSV cache — avoids re-fetching when switching back to a visited country
// ---------------------------------------------------------------------------
const csvCache = new Map();

// ---------------------------------------------------------------------------
// Interaction state
// ---------------------------------------------------------------------------
let currentFlowDir = "imports";   // "imports" or "exports"
let currentFocusCountry = document.getElementById("country-select").value || "US";
let selectedArrow = null;
const NORMAL_OPACITY    = 0.65;
const HIGHLIGHT_OPACITY = 1.0;
const DIM_OPACITY       = 0.08;

// ---------------------------------------------------------------------------
// Tooltip
// ---------------------------------------------------------------------------
const tooltip = document.getElementById("map-tooltip");

function showTooltip(trade, focusCountry, flowDir, evt) {
    const label = `${countryLabel(trade.from)} \u2192 ${countryLabel(trade.to)}`;
    if (flowDir === "balance") {
        const balanceLabel = trade.netCo2 >= 0 ? "Trade surplus" : "Trade deficit";
        tooltip.innerHTML =
            `<div class="tt-direction">${label}</div>` +
            `<div class="tt-co2">${balanceLabel}: ${fmtCO2(trade.co2)}</div>` +
            `<div>Exports: ${fmtCO2(trade.exportsCo2 || 0)}</div>` +
            `<div>Imports: ${fmtCO2(trade.importsCo2 || 0)}</div>`;
    } else {
        tooltip.innerHTML =
            `<div class="tt-direction">${label}</div>` +
            `<div class="tt-co2">${fmtCO2(trade.co2)}</div>`;
    }
    tooltip.style.display = "block";
    moveTooltip(evt);
}

function moveTooltip(evt) {
    const pad    = 14;
    const tw     = tooltip.offsetWidth;
    const th     = tooltip.offsetHeight;
    const vw     = window.innerWidth;
    const vh     = window.innerHeight;
    // Flip left if tooltip would overflow right edge
    const x = evt.clientX + pad + tw > vw
        ? evt.clientX - tw - pad
        : evt.clientX + pad;
    // Flip up if tooltip would overflow bottom
    const y = evt.clientY + th + pad > vh
        ? evt.clientY - th - pad
        : evt.clientY - 10;
    tooltip.style.left = x + "px";
    tooltip.style.top  = y + "px";
}

function hideTooltip() {
    tooltip.style.display = "none";
}

// ---------------------------------------------------------------------------
// Highlight / clear
// ---------------------------------------------------------------------------
function applyHighlight(partnerCode) {
    g.selectAll("path.arrow").style("opacity", DIM_OPACITY);
    const targetPath = g.select("path.arrow-" + partnerCode);
    if (!targetPath.empty()) {
        const baseSW = parseFloat(targetPath.attr("data-base-sw")) || 2;
        targetPath
            .style("opacity", HIGHLIGHT_OPACITY)
            .style("stroke-width", (baseSW + 3) + "px");
    }
    document.querySelectorAll("#source-filters label").forEach(el => {
        el.classList.toggle("highlighted", el.dataset.partner === partnerCode);
    });
}

function clearHighlight() {
    g.selectAll("path.arrow")
        .style("opacity", NORMAL_OPACITY)
        .style("stroke-width", null);
    document.querySelectorAll("#source-filters label")
        .forEach(el => el.classList.remove("highlighted"));
    hideTooltip();
}

// ---------------------------------------------------------------------------
// Curve drawing
// ---------------------------------------------------------------------------
function projectPoint(lon, lat) {
    return map.latLngToLayerPoint(new L.LatLng(lat, lon));
}

function projectTradePoint(countryCode, lonShift) {
    const [lon, lat] = COORDS[countryCode];
    return projectPoint(lon + (lonShift || 0), lat);
}

function isAmericasCountry(countryCode) {
    const coords = COORDS[countryCode];
    if (!coords) return false;
    const [lon, lat] = coords;
    return lon <= -30 && lat <= 75 && lat >= -60;
}

function isAsiaPacificCountry(countryCode) {
    const coords = COORDS[countryCode];
    return Boolean(coords && coords[0] >= PACIFIC_ROUTE_MIN_LON);
}

function getPacificPartnerLonShift(focusCountry, partnerCode) {
    if (isAmericasCountry(focusCountry) && isAsiaPacificCountry(partnerCode)) {
        return -360;
    }
    if (isAsiaPacificCountry(focusCountry) && isAmericasCountry(partnerCode)) {
        return 360;
    }
    return 0;
}

function getTradePoints(d) {
    return {
        from: projectTradePoint(d.from, d.fromLonShift),
        to: projectTradePoint(d.to, d.toLonShift),
    };
}

function drawCurve(d) {
    const { from, to } = getTradePoints(d);
    return buildArcPath(from, to, 1);
}

function buildArcPath(from, to, sweepFlag) {
    const dx   = to.x - from.x;
    const dy   = to.y - from.y;
    const dr   = Math.sqrt(dx * dx + dy * dy);
    return `M${from.x},${from.y}A${dr},${dr} 0 0,${sweepFlag} ${to.x},${to.y}`;
}

function drawLabelCurve(d, flipLabel) {
    const { from, to } = getTradePoints(d);
    return flipLabel
        ? buildArcPath(to, from, 0)
        : buildArcPath(from, to, 1);
}

function pathMidAngle(pathNode) {
    const total = pathNode.getTotalLength();
    const delta = Math.max(1, Math.min(18, total * 0.025));
    const p1 = pathNode.getPointAtLength(Math.max(0, total / 2 - delta));
    const p2 = pathNode.getPointAtLength(Math.min(total, total / 2 + delta));
    return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
}

function labelNeedsFlip(pathNode) {
    const angle = pathMidAngle(pathNode);
    return angle > 90 || angle < -90;
}

function update() {
    g.selectAll("path.arrow").attr("d", drawCurve);
    g.selectAll("path.label-path").attr("d", function(d) {
        return drawLabelCurve(d, this.dataset.flipLabel === "true");
    });
}
map.on("zoomend", update);
map.on("moveend", update);

function getLeftOverlayInset() {
    return [document.querySelector(".control-panel"), document.getElementById("map-legend")]
        .filter(Boolean)
        .reduce((maxInset, el) => {
            const rect = el.getBoundingClientRect();
            return Math.max(maxInset, rect.right + 24);
        }, 0);
}

function centerMapForCountry(countryCode) {
    const coords = COORDS[countryCode];
    if (!coords) return;

    const focusLatLng = new L.LatLng(coords[1], coords[0]);
    map.setView(focusLatLng, DEFAULT_MAP_ZOOM, { animate: false });

    const mapSize = map.getSize();
    const desiredPoint = L.point(
        Math.min(mapSize.x - 80, (mapSize.x / 2) + (getLeftOverlayInset() * COUNTRY_CENTER_OFFSET_FACTOR)),
        mapSize.y / 2
    );
    const currentPoint = map.latLngToContainerPoint(focusLatLng);
    const panDelta = currentPoint.subtract(desiredPoint);

    if (Math.abs(panDelta.x) > 1 || Math.abs(panDelta.y) > 1) {
        map.panBy(panDelta, { animate: false });
    }
}

function getSelectedCountryValue() {
    return document.getElementById("country-select").value;
}

function setSelectedCountryValue(countryCode) {
    const select = document.getElementById("country-select");
    const hasOption = Array.from(select.options).some(option => option.value === countryCode);
    if (!hasOption) return false;
    select.value = countryCode;
    return true;
}

function getHashCountry() {
    if (typeof getHash !== "function") return "";
    return getHash().country || "";
}

function syncCountryToHash(countryCode) {
    if (typeof updateHash === "function") {
        updateHash({ country: countryCode });
    }
}

function applyCountrySelection(countryCode, flowDir) {
    if (!setSelectedCountryValue(countryCode)) return false;
    loadFlows(countryCode, flowDir);
    return true;
}

function collectImports(data, focusCountry) {
    const flowMap = new Map();
    for (const row of data) {
        const src = row.region1;
        if (!src || src === focusCountry || !COORDS[src]) continue;
        const val = parseFloat(row.CO2_total) || 0;
        if (val <= 0) continue;
        flowMap.set(src, (flowMap.get(src) || 0) + val);
    }
    return flowMap;
}

function collectExports(data, focusCountry) {
    const flowMap = new Map();
    for (const row of data) {
        const dst = row.region2;
        if (!dst || dst === focusCountry || !COORDS[dst]) continue;
        const val = parseFloat(row.CO2_total) || 0;
        if (val <= 0) continue;
        flowMap.set(dst, (flowMap.get(dst) || 0) + val);
    }
    return flowMap;
}

function getCountryLabelText(flowDir) {
    if (flowDir === "exports") return "Exporting country:";
    if (flowDir === "balance") return "Balance country:";
    return "Importing country:";
}

function buildDirectionalTrades(flowMap, focusCountry, flowDir) {
    return Array.from(flowMap.entries())
        .sort((a, b) => b[1] - a[1])
        .map(([partner, co2]) => {
            const partnerLonShift = getPacificPartnerLonShift(focusCountry, partner);
            return {
                from: flowDir === "imports" ? partner : focusCountry,
                to: flowDir === "imports" ? focusCountry : partner,
                fromLonShift: flowDir === "imports" ? partnerLonShift : 0,
                toLonShift: flowDir === "exports" ? partnerLonShift : 0,
                co2,
                partner,
            };
        });
}

function buildBalanceTrades(importsData, exportsData, focusCountry) {
    const importMap = collectImports(importsData, focusCountry);
    const exportMap = collectExports(exportsData, focusCountry);
    const partners = new Set([...importMap.keys(), ...exportMap.keys()]);

    return Array.from(partners)
        .map(partner => {
            const importsCo2 = importMap.get(partner) || 0;
            const exportsCo2 = exportMap.get(partner) || 0;
            const netCo2 = exportsCo2 - importsCo2;
            if (netCo2 === 0) return null;

            const partnerLonShift = getPacificPartnerLonShift(focusCountry, partner);
            const isSurplus = netCo2 > 0;
            return {
                from: isSurplus ? focusCountry : partner,
                to: isSurplus ? partner : focusCountry,
                fromLonShift: isSurplus ? 0 : partnerLonShift,
                toLonShift: isSurplus ? partnerLonShift : 0,
                co2: Math.abs(netCo2),
                netCo2,
                importsCo2,
                exportsCo2,
                balanceSign: isSurplus ? "positive" : "negative",
                partner,
            };
        })
        .filter(Boolean)
        .sort((a, b) => b.co2 - a.co2);
}

function getWidthScale(trades) {
    const maxCO2 = d3.max(trades, d => d.co2) || 0;
    const minCO2 = d3.min(trades, d => d.co2) || 0;
    if (maxCO2 === minCO2) {
        return () => (maxCO2 > 0 ? 8 : 0);
    }
    return d3.scaleLinear()
        .domain([minCO2, maxCO2])
        .range([1.5, 14]);
}

function getBalanceColorScale(trades, sign) {
    const signedTrades = trades.filter(trade => trade.balanceSign === sign);
    const maxMagnitude = d3.max(signedTrades, d => d.co2) || 0;
    const darkColor = sign === "negative" ? BALANCE_NEGATIVE_DARK : BALANCE_POSITIVE_DARK;
    const lightColor = sign === "negative" ? BALANCE_NEGATIVE_LIGHT : BALANCE_POSITIVE_LIGHT;

    if (maxMagnitude <= 0) {
        return () => darkColor;
    }

    return magnitude => {
        const t = Math.max(0, Math.min(1, magnitude / maxMagnitude));
        return d3.interpolateRgb(darkColor, lightColor)(t);
    };
}

// ---------------------------------------------------------------------------
// Render arrows
// ---------------------------------------------------------------------------
function renderArrows(trades, focusCountry, flowDir) {
    g.selectAll("*").remove();
    svg.selectAll("defs").remove();

    if (trades.length === 0) return;

    const widthScale = getWidthScale(trades);
    const negativeBalanceColor = getBalanceColorScale(trades, "negative");
    const positiveBalanceColor = getBalanceColorScale(trades, "positive");

    // Single <defs> for all markers
    const defs = svg.append("defs");

    trades.forEach((trade, i) => {
        const pathId   = `trade-path-${i}`;
        const markerId = `arrowhead-${i}`;
        const color    = flowDir === "balance"
            ? (trade.balanceSign === "negative" ? negativeBalanceColor(trade.co2) : positiveBalanceColor(trade.co2))
            : colorScale(i);
        const sw       = widthScale(trade.co2);

        defs.append("marker")
            .attr("id", markerId)
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 10).attr("refY", 0)
            .attr("markerWidth", 5).attr("markerHeight", 5)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", color)
            .attr("opacity", 0.7);

        const path = g.append("path")
            .datum(trade)
            .attr("id", pathId)
            .attr("class", `arrow arrow-${trade.partner}`)
            .attr("d", drawCurve(trade))
            .attr("stroke", color)
            .attr("stroke-width", sw)
            .attr("data-base-sw", sw)
            .attr("data-partner", trade.partner)
            .attr("marker-end", `url(#${markerId})`)
            .style("opacity", NORMAL_OPACITY);

        path.on("mouseover", function(evt) {
                map.getContainer().style.cursor = "default";
                applyHighlight(trade.partner);
                showTooltip(trade, focusCountry, flowDir, evt);
            })
            .on("mousemove", function(evt) {
                moveTooltip(evt);
            })
            .on("mouseout", function() {
                map.getContainer().style.cursor = "";
                hideTooltip();
                selectedArrow ? applyHighlight(selectedArrow) : clearHighlight();
            })
            .on("click", function(evt) {
                if (evt && typeof evt.stopPropagation === "function") {
                    evt.stopPropagation();
                }
                if (selectedArrow === trade.partner) {
                    selectedArrow = null;
                    clearHighlight();
                } else {
                    selectedArrow = trade.partner;
                    applyHighlight(trade.partner);
                }
            });

        const flipLabel = labelNeedsFlip(path.node());
        const labelPathId = `${pathId}-label`;

        g.append("path")
            .datum(trade)
            .attr("id", labelPathId)
            .attr("class", `label-path arrow-${trade.partner}`)
            .attr("d", drawLabelCurve(trade, flipLabel))
            .attr("fill", "none")
            .attr("stroke", "none")
            .attr("data-flip-label", flipLabel ? "true" : "false");

        g.append("text")
            .attr("class", `arrow-${trade.partner}`)
            .append("textPath")
            .attr("xlink:href", `#${labelPathId}`)
            .attr("startOffset", flipLabel ? "58%" : "42%")
            .attr("class", "label-text")
            .attr("text-anchor", "middle")
            .text(trade.partner);
    });
}

// ---------------------------------------------------------------------------
// Build checkboxes
// ---------------------------------------------------------------------------
function buildCheckboxes(trades, focusCountry, flowDir) {
    const container = document.getElementById("source-filters");
    container.innerHTML = "";
    if (trades.length === 0) return;

    const header = document.createElement("div");
    header.style.cssText = "font-size:11px;font-weight:600;margin-bottom:6px;color:#333;";
    header.textContent = flowDir === "imports"
        ? "Toggle exporters:"
        : flowDir === "exports"
            ? "Toggle importers:"
            : "Toggle balance partners:";
    container.appendChild(header);

    trades.forEach(trade => {
        const label    = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type    = "checkbox";
        checkbox.checked = true;
        checkbox.value   = trade.partner;
        label.dataset.partner = trade.partner;

        checkbox.addEventListener("change", function() {
            const vis = this.checked ? "visible" : "hidden";
            d3.selectAll(`.arrow-${trade.partner}`).attr("visibility", vis);
        });

        label.appendChild(checkbox);
        const tradeText = flowDir === "balance"
            ? ` ${trade.partner} \u2014 ${trade.netCo2 >= 0 ? "surplus" : "deficit"} ${fmtCO2(trade.co2)}`
            : ` ${trade.partner} \u2014 ${fmtCO2(trade.co2)}`;
        label.appendChild(document.createTextNode(tradeText));

        label.addEventListener("mouseenter", () => applyHighlight(trade.partner));
        label.addEventListener("mouseleave", () => {
            selectedArrow ? applyHighlight(selectedArrow) : clearHighlight();
        });

        container.appendChild(label);
    });
}

// ---------------------------------------------------------------------------
// Load CSV — with cache
// ---------------------------------------------------------------------------
function setStatus(msg) {
    document.getElementById("status-msg").textContent = msg;
}

function processAndRender(data, focusCountry, flowDir) {
    let trades = [];

    if (flowDir === "imports") {
        trades = buildDirectionalTrades(collectImports(data, focusCountry), focusCountry, flowDir);
    } else if (flowDir === "exports") {
        trades = buildDirectionalTrades(collectExports(data, focusCountry), focusCountry, flowDir);
    } else {
        trades = buildBalanceTrades(data.importsData, data.exportsData, focusCountry);
    }

    if (trades.length === 0) { setStatus("No data found."); return; }

    const arrow = flowDir === "imports"
        ? `${trades.length} exporters \u2192 ${countryLabel(focusCountry)}`
        : flowDir === "exports"
            ? `${countryLabel(focusCountry)} \u2192 ${trades.length} importers`
            : `${trades.filter(trade => trade.netCo2 > 0).length} surplus / ${trades.filter(trade => trade.netCo2 < 0).length} deficit partners`;
    setStatus(arrow);

    const legendDir = flowDir === "balance"
        ? "net exporter \u2192 net importer"
        : "exporter \u2192 importer";
    document.getElementById("legend-dir").textContent = legendDir;

    renderArrows(trades, focusCountry, flowDir);
    buildCheckboxes(trades, focusCountry, flowDir);
}

function fetchTradeCsv(focusCountry, flowDir) {
    const cacheKey = `${focusCountry}/${flowDir}`;
    if (csvCache.has(cacheKey)) {
        return Promise.resolve(csvCache.get(cacheKey));
    }

    const url = `https://raw.githubusercontent.com/ModelEarth/trade-data/main/year/2022/${focusCountry}/${flowDir}/trade_impact.csv`;
    return d3.csv(url).then(function(data) {
        csvCache.set(cacheKey, data);
        return data;
    });
}

function loadFlows(focusCountry, flowDir) {
    currentFocusCountry = focusCountry;
    selectedArrow = null;
    hideTooltip();
    g.selectAll("*").remove();
    svg.selectAll("defs").remove();
    document.getElementById("source-filters").innerHTML = "";
    centerMapForCountry(focusCountry);

    setStatus("Loading\u2026");

    const loadRequest = flowDir === "balance"
        ? Promise.all([
            fetchTradeCsv(focusCountry, "imports"),
            fetchTradeCsv(focusCountry, "exports"),
        ]).then(function([importsData, exportsData]) {
            return { importsData, exportsData };
        })
        : fetchTradeCsv(focusCountry, flowDir);

    loadRequest.then(function(data) {
        processAndRender(data, focusCountry, flowDir);
    }).catch(function(err) {
        setStatus("Error loading data.");
        console.error("Trade flow fetch failed:", err);
    });
}

// ---------------------------------------------------------------------------
// Country selector + flow direction toggle
// ---------------------------------------------------------------------------
document.getElementById("country-select").addEventListener("change", function() {
    syncCountryToHash(this.value);
    loadFlows(this.value, currentFlowDir);
});

document.querySelectorAll("input[name='flow-dir']").forEach(radio => {
    radio.addEventListener("change", function() {
        currentFlowDir = this.value;
        document.getElementById("country-label").textContent = getCountryLabelText(currentFlowDir);
        loadFlows(document.getElementById("country-select").value, currentFlowDir);
    });
});

map.on("click", function(evt) {
    if (!clickShouldToggleZoom(evt)) return;
    setScrollZoom(!map.scrollWheelZoom.enabled());
});

map.on("resize", function() {
    centerMapForCountry(currentFocusCountry);
});

document.addEventListener("hashChangeEvent", function() {
    const hash = getHash();
    if (!hash.country || hash.country === window.priorHash?.country || hash.country === currentFocusCountry) {
        return;
    }
    applyCountrySelection(hash.country, currentFlowDir);
});

const initialCountry = getHashCountry() || getSelectedCountryValue();
if (!applyCountrySelection(initialCountry, currentFlowDir)) {
    applyCountrySelection(getSelectedCountryValue(), currentFlowDir);
}
syncCountryToHash(getSelectedCountryValue());
</script>
