<script>

    PT: [-8.2245,  39.3999], HU: [19.5033,  47.1625], RO: [24.9668,  45.9432],
    WM: [20,       15     ],
};

const COUNTRY_NAMES = {
    US: "United States", CN: "China",          DE: "Germany",
    IN: "India",         RU: "Russia",         CA: "Canada",
    JP: "Japan",         GB: "United Kingdom", FR: "France",
    BR: "Brazil",        AU: "Australia",      MX: "Mexico",
    KR: "South Korea",   IT: "Italy",          ES: "Spain",
    NL: "Netherlands",   SA: "Saudi Arabia",   ZA: "South Africa",
    AR: "Argentina",     TR: "Turkey",         ID: "Indonesia",
    PL: "Poland",        BE: "Belgium",        SE: "Sweden",
    NO: "Norway",        CH: "Switzerland",    AT: "Austria",
    CZ: "Czech Republic",FI: "Finland",        DK: "Denmark",
    TW: "Taiwan",        TH: "Thailand",       MY: "Malaysia",
    SG: "Singapore",     PH: "Philippines",    VN: "Vietnam",
    NG: "Nigeria",       EG: "Egypt",          GR: "Greece",
    PT: "Portugal",      HU: "Hungary",        RO: "Romania",
};

function countryLabel(code) { return COUNTRY_NAMES[code] || code; }

function normalizeCode(value) {
    return String(value || "").trim().toUpperCase();
}

function fmtCO2(val) {
    if (val >= 1e15) return (val / 1e15).toFixed(2) + " Tt CO\u2082";
    if (val >= 1e12) return (val / 1e12).toFixed(2) + " Gt CO\u2082";
    if (val >= 1e9)  return (val / 1e9).toFixed(2)  + " Mt CO\u2082";
    return val.toExponential(2) + " CO\u2082";
}

function getCurrencyRate(year, code) {
    if (!code || code === "EUR") return 1;
    const yearRates = mapCurrencyRates[String(year)] || {};
    return parseFloat(yearRates[code]) || 1;
}

function fmtIndicator(val) {
    const state = TradeShared.getState();
    const metricKey = state.metric;
    const metric = TradeShared.METRICS[metricKey];
    if (!metric || metricKey === "CO2_total") return fmtCO2(val);
    if (metricKey === "amount") {
        const rate = getCurrencyRate(state.year, state.currency);
        const converted = val * rate;
        const scaled = converted / metric.scale;
        return scaled.toFixed(2) + "\u00A0M\u00A0" + state.currency;
    }
    const scaled = val / metric.scale;
    return scaled.toFixed(2) + "\u00A0" + metric.unit;
}

function indicatorSourceKey() {
    const metricKey = TradeShared.getState().metric;
    const metric = TradeShared.METRICS[metricKey];
    return (metric && metric.sourceKeys && metric.sourceKeys[0]) || "CO2_total";
}

function indicatorLabel() {
    const state = TradeShared.getState();
    const metricKey = state.metric;
    if (metricKey === "amount") {
        return "Amount Spent (" + state.currency + ")";
    }
    return (TradeShared.METRICS[metricKey] && TradeShared.METRICS[metricKey].label) || "CO\u2082 Emissions";
}

function fmtAmountValue(val) {
    const state = TradeShared.getState();
    const rate = getCurrencyRate(state.year, state.currency);
    const converted = (parseFloat(val) || 0) * rate;
    return converted.toFixed(2) + "\u00A0M\u00A0" + state.currency;
}

function escapeHtml(value) {
    return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

const DEFAULT_MAP_ZOOM = 2;
const INITIAL_MAP_CENTER = [20, -55];
const PACIFIC_ROUTE_MIN_LON = 70;
const COUNTRY_CENTER_OFFSET_FACTOR = 0.26;
const BALANCE_NEGATIVE_DARK = "#c96256";
const BALANCE_NEGATIVE_LIGHT = "#f3c6bf";
const BALANCE_POSITIVE_DARK = "#0f6b57";
const BALANCE_POSITIVE_LIGHT = "#bfe3d1";
const FLOW_BASE_COLORS = {
    imports: "#2563eb",
    exports: "#dd6b20",
};
const TYPE_STYLE_MAP = {
    resources: {
        label: "materials",
        dasharray: "",
        markerPath: "M0,-5L10,0L0,5Z",
        swatchStyle: "solid",
    },
    manufacturing: {

        dasharray: "16 7",
        markerPath: "M0,-4L9,0L0,4L3.2,0Z",
        swatchStyle: "dashed",
    },
    consumer: {
        label: "consumer goods",
        dasharray: "18 7 4 7",
        markerPath: "M0,-5L10,0L0,5L2.3,0Z",

    },
    services: {

    },
    mixed: {

        dasharray: "10 7",

};

// ---------------------------------------------------------------------------
// Map setup
// ---------------------------------------------------------------------------
const map = L.map("map", {
    scrollWheelZoom: false,
    zoomSnap: 1,
}).setView(INITIAL_MAP_CENTER, DEFAULT_MAP_ZOOM);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "\u00a9 OpenStreetMap contributors | Data: EXIOBASE 3 / ModelEarth",
}).addTo(map);

L.svg().addTo(map);
const svg = d3.select("#map").select("svg");
const g   = svg.append("g");

const typeColorScale = d3.scaleOrdinal([
    "#22c55e", "#06b6d4", "#8b5cf6", "#f43f5e", "#f59e0b",
    "#14b8a6", "#84cc16", "#ec4899", "#0ea5e9", "#a855f7",
]);
const zoomToast = document.getElementById("zoom-toast");
let zoomToastTimer = null;

L.DomEvent.disableClickPropagation(document.querySelector(".control-panel"));
L.DomEvent.disableScrollPropagation(document.querySelector(".control-panel"));
L.DomEvent.disableClickPropagation(document.getElementById("map-legend"));
L.DomEvent.disableScrollPropagation(document.getElementById("map-legend"));

function showZoomToast(enabled) {
    zoomToast.textContent = enabled ? "Zoom On" : "Zoom Off";
    zoomToast.classList.add("visible");

    if (zoomToastTimer) {
        clearTimeout(zoomToastTimer);
    }
    zoomToastTimer = setTimeout(() => {
        zoomToast.classList.remove("visible");
        zoomToastTimer = null;
    }, 2000);
}

function setScrollZoom(enabled) {
    if (enabled) {
        map.scrollWheelZoom.enable();
    } else {
        map.scrollWheelZoom.disable();
    }
    showZoomToast(enabled);
}

function clickShouldToggleZoom(evt) {
    const target = evt.originalEvent?.target;
    if (!(target instanceof Element)) return false;
    const mapObjectRoot = g.node();

    if (mapObjectRoot && mapObjectRoot.contains(target) && target !== mapObjectRoot) {
        return false;
    }

    return !target.closest([
        ".control-panel",
        "#map-legend",
        "#map-tooltip",
        "#zoom-toast",
        ".leaflet-marker-icon",
        ".leaflet-popup",
        ".leaflet-tooltip",
        ".leaflet-interactive",
    ].join(","));
}

// ---------------------------------------------------------------------------
// CSV cache — avoids re-fetching when switching back to a visited country
// ---------------------------------------------------------------------------
const csvCache = new Map();

// Currency exchange rates keyed by year string, then currency code
const mapCurrencyRates = {};
const industryNameByYear = {};

// ---------------------------------------------------------------------------
// Interaction state
// ---------------------------------------------------------------------------
let currentFlowDir = "imports";   // "imports" or "exports"
let currentFocusCountry = document.getElementById("country-select").value || "US";
let selectedArrow = null;
const NORMAL_OPACITY    = 0.65;
const HIGHLIGHT_OPACITY = 1.0;
const DIM_OPACITY       = 0.08;
const VALID_FLOW_DIRS = new Set(["imports", "exports", "balance"]);

// ---------------------------------------------------------------------------
// Tooltip
// ---------------------------------------------------------------------------
const tooltip = document.getElementById("map-tooltip");

function industryLabel(code) {
    const key = normalizeCode(TradeShared.getState().year);
    const yearMap = industryNameByYear[key] || {};
    const normalized = normalizeCode(code);
    return yearMap[normalized] || normalized || "Unknown";
}

function classifyTradeFamily(code) {
    const descriptor = `${normalizeCode(code)} ${industryLabel(code)}`.toLowerCase();
    if (/(crude|petro|gas|coal|mining|metal|ore|cement|ceram|stone|glass|basic|alum|copp|steel|nicke|lead|zinc|wood|paper|fert|water|seaco|rawmi|forest|fores|pulp)/.test(descriptor)) {
        return "resources";
    }
    if (/(machi|motor|elect|compu|rubbe|plast|chem|pharm|medic|fabric|metal products|machinery|equipment|vehicle|electronics)/.test(descriptor)) {
        return "manufacturing";
    }
    if (/(food|meat|dairy|fish|bever|wear|texti|leath|furni|retai|whole|white|hotel|tour|agri|crop|paddy|wheat|veget|fruit|sugar|grain)/.test(descriptor)) {
        return "consumer";
    }
    if (/(resea|healt|publi|busin|educa|finan|insur|rent|real|post|rail|air|trans|wholesale|retail|trade|hotel|service|admin|support|repair)/.test(descriptor)) {
        return "services";
    }
    return "mixed";
}

function rankValue(entry) {
    return Math.max(parseFloat(entry.metricValue) || 0, parseFloat(entry.amountValue) || 0);
}

function summarizeTypeMap(typeMap, limit) {
    return Array.from(typeMap.values())
        .sort((a, b) => rankValue(b) - rankValue(a))
        .slice(0, limit || 3)
        .map(entry => ({
            code: entry.code,
            label: industryLabel(entry.code),
            metricValue: entry.metricValue,
            amountValue: entry.amountValue,
        }));
}

function formatTypeChips(items, labelPrefix) {
    if (!items || !items.length) {
        return `<div class="tt-chip">${escapeHtml(labelPrefix)} not available</div>`;
    }
    return items.map(item => {
        return `<div class="tt-chip">${escapeHtml(item.label)}: ${escapeHtml(fmtIndicator(item.metricValue))}</div>`;
    }).join("");
}

function createPartnerSummary(partner) {
    return {
        partner,
        co2: 0,
        amount: 0,
        rowCount: 0,
        typeMap: new Map(),
    };
}

function getPartnerSummary(mapRef, partner) {
    if (!mapRef.has(partner)) {
        mapRef.set(partner, createPartnerSummary(partner));
    }
    return mapRef.get(partner);
}

function loadIndustryNamesForYear(year) {
    const key = normalizeCode(year);
    if (!key) return Promise.resolve({});
    if (industryNameByYear[key]) return Promise.resolve(industryNameByYear[key]);

    const url = `https://raw.githubusercontent.com/ModelEarth/trade-data/main/year/${key}/industry.csv`;
    return d3.csv(url).then(rows => {
        const yearMap = {};
        rows.forEach(row => {
            const industryId = normalizeCode(row.industry_id);
            const name = String(row.name || row.industry_name || "").trim();
            if (industryId) {
                yearMap[industryId] = name || industryId;
            }
        });
        industryNameByYear[key] = yearMap;
        return yearMap;
    }).catch(() => {
        industryNameByYear[key] = {};
        return industryNameByYear[key];
    });
}

function prepareDirectionalSummary(summary) {
    summary.topTypes = summarizeTypeMap(summary.typeMap, 3);
    summary.dominantType = summary.topTypes[0]?.code || "";
    summary.dominantTypeLabel = summary.topTypes[0]?.label || "Mixed trade";
    summary.typeFamily = classifyTradeFamily(summary.dominantType);
    return summary;
}

function showTooltip(trade, focusCountry, flowDir, evt) {
    const label = `${countryLabel(trade.from)} \u2192 ${countryLabel(trade.to)}`;
    if (flowDir === "balance") {
        const balanceLabel = trade.netCo2 >= 0 ? "Trade surplus" : "Trade deficit";
        tooltip.innerHTML =
            `<div class="tt-direction">${label}</div>` +
            `<div class="tt-co2">${balanceLabel}: ${fmtIndicator(trade.co2)}</div>` +
            `<div class="tt-muted">Exports: ${fmtIndicator(trade.exportsCo2 || 0)} | ${fmtAmountValue(trade.exportsAmount || 0)}</div>` +
            `<div class="tt-muted">Imports: ${fmtIndicator(trade.importsCo2 || 0)} | ${fmtAmountValue(trade.importsAmount || 0)}</div>` +
            `<div class="tt-muted">Arrow style: ${escapeHtml(trade.typeFamilyLabel || "mixed trade")} in ${escapeHtml(trade.balanceSign || "balance")} mode</div>` +
            `<div class="tt-subhead">Top export types</div>` +
            formatTypeChips(trade.exportTopTypes, "Exports") +
            `<div class="tt-subhead">Top import types</div>` +
            formatTypeChips(trade.importTopTypes, "Imports");
    } else {
        const tradeLabel = flowDir === "imports" ? "Imports" : "Exports";
        tooltip.innerHTML =
            `<div class="tt-direction">${label}</div>` +
            `<div class="tt-co2">${tradeLabel}: ${fmtIndicator(trade.co2)}</div>` +
            `<div class="tt-muted">Amount spent: ${fmtAmountValue(trade.amount || 0)}</div>` +
            `<div class="tt-muted">Dominant type: ${escapeHtml(trade.dominantTypeLabel || "Mixed trade")} (${escapeHtml(trade.typeFamilyLabel || "mixed trade")})</div>` +
            `<div class="tt-subhead">Top ${tradeLabel.toLowerCase()} types</div>` +
            formatTypeChips(trade.topTypes, tradeLabel);
    }
    tooltip.style.display = "block";
    moveTooltip(evt);
}

function moveTooltip(evt) {
    const pad    = 14;
    const tw     = tooltip.offsetWidth;
    const th     = tooltip.offsetHeight;
    const vw     = window.innerWidth;
    const vh     = window.innerHeight;
    // Flip left if tooltip would overflow right edge
    const x = evt.clientX + pad + tw > vw
        ? evt.clientX - tw - pad
        : evt.clientX + pad;
    // Flip up if tooltip would overflow bottom
    const y = evt.clientY + th + pad > vh
        ? evt.clientY - th - pad
        : evt.clientY - 10;
    tooltip.style.left = x + "px";
    tooltip.style.top  = y + "px";
}

function hideTooltip() {
    tooltip.style.display = "none";
}

function getFilterRow(partnerCode) {
    return document.querySelector(`#source-filters label[data-partner='${partnerCode}']`);

function applyHighlight(partnerCode, options) {
    const settings = Object.assign({ scroll: true }, options);
    g.selectAll("path.arrow")
        .classed("is-active", false)
        .style("opacity", DIM_OPACITY)
        .style("stroke-width", function() {
            return `${parseFloat(this.getAttribute("data-base-sw")) || 2}px`;
        });

    const targetPath = g.select("path.arrow-" + partnerCode);
    if (!targetPath.empty()) {
        const baseSW = parseFloat(targetPath.attr("data-base-sw")) || 2;
        g.selectAll(".arrow-" + partnerCode).raise();
        targetPath
            .classed("is-active", true)
            .style("opacity", HIGHLIGHT_OPACITY)
            .style("stroke-width", (baseSW + 4.5) + "px");
    }

    document.querySelectorAll("#source-filters label").forEach(el => {
        const isMatch = el.dataset.partner === partnerCode;
        el.classList.toggle("highlighted", isMatch);
        if (isMatch && settings.scroll) {
            el.scrollIntoView({ block: "nearest" });
        }

function clearHighlight() {
    g.selectAll("path.arrow")
        .classed("is-active", false)
        .style("opacity", NORMAL_OPACITY)
        .style("stroke-width", function() {
            return `${parseFloat(this.getAttribute("data-base-sw")) || 2}px`;
        });
    document.querySelectorAll("#source-filters label")
        .forEach(el => el.classList.remove("highlighted"));
    hideTooltip();
}

// ---------------------------------------------------------------------------
// Curve drawing
// ---------------------------------------------------------------------------
function projectPoint(lon, lat) {
    return map.latLngToLayerPoint(new L.LatLng(lat, lon));
}

function projectTradePoint(countryCode, lonShift) {
    const [lon, lat] = COORDS[countryCode];
    return projectPoint(lon + (lonShift || 0), lat);
}

function isAmericasCountry(countryCode) {
    const coords = COORDS[countryCode];
    if (!coords) return false;
    const [lon, lat] = coords;
    return lon <= -30 && lat <= 75 && lat >= -60;
}

function isAsiaPacificCountry(countryCode) {
    const coords = COORDS[countryCode];
    return Boolean(coords && coords[0] >= PACIFIC_ROUTE_MIN_LON);
}

function getPacificPartnerLonShift(focusCountry, partnerCode) {
    if (isAmericasCountry(focusCountry) && isAsiaPacificCountry(partnerCode)) {
        return -360;
    }
    if (isAsiaPacificCountry(focusCountry) && isAmericasCountry(partnerCode)) {
        return 360;
    }
    return 0;
}

function getTradePoints(d) {
    return {
        from: projectTradePoint(d.from, d.fromLonShift),
        to: projectTradePoint(d.to, d.toLonShift),
    };
}

function drawCurve(d) {
    const { from, to } = getTradePoints(d);
    return buildArcPath(from, to, 1);
}

function buildArcPath(from, to, sweepFlag) {
    const dx   = to.x - from.x;
    const dy   = to.y - from.y;
    const dr   = Math.sqrt(dx * dx + dy * dy);
    return `M${from.x},${from.y}A${dr},${dr} 0 0,${sweepFlag} ${to.x},${to.y}`;
}

function drawLabelCurve(d, flipLabel) {
    const { from, to } = getTradePoints(d);
    return flipLabel
        ? buildArcPath(to, from, 0)
        : buildArcPath(from, to, 1);
}

function pathMidAngle(pathNode) {
    const total = pathNode.getTotalLength();
    const delta = Math.max(1, Math.min(18, total * 0.025));
    const p1 = pathNode.getPointAtLength(Math.max(0, total / 2 - delta));
    const p2 = pathNode.getPointAtLength(Math.min(total, total / 2 + delta));
    return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
}

function labelNeedsFlip(pathNode) {
    const angle = pathMidAngle(pathNode);
    return angle > 90 || angle < -90;
}

function update() {
    g.selectAll("path.arrow").attr("d", drawCurve);
    g.selectAll("path.arrow-hit").attr("d", drawCurve);
    g.selectAll("path.label-path").attr("d", function(d) {
        return drawLabelCurve(d, this.dataset.flipLabel === "true");
    });
}
map.on("zoomend", update);
map.on("moveend", update);

function getLeftOverlayInset() {
    return [document.querySelector(".control-panel"), document.getElementById("map-legend")]
        .filter(Boolean)
        .reduce((maxInset, el) => {
            const rect = el.getBoundingClientRect();
            return Math.max(maxInset, rect.right + 24);
        }, 0);
}

function centerMapForCountry(countryCode) {
    const coords = COORDS[countryCode];
    if (!coords) return;

    const focusLatLng = new L.LatLng(coords[1], coords[0]);
    map.setView(focusLatLng, DEFAULT_MAP_ZOOM, { animate: false });

    const mapSize = map.getSize();
    const desiredPoint = L.point(
        Math.min(mapSize.x - 80, (mapSize.x / 2) + (getLeftOverlayInset() * COUNTRY_CENTER_OFFSET_FACTOR)),
        mapSize.y / 2
    );
    const currentPoint = map.latLngToContainerPoint(focusLatLng);
    const panDelta = currentPoint.subtract(desiredPoint);

    if (Math.abs(panDelta.x) > 1 || Math.abs(panDelta.y) > 1) {
        map.panBy(panDelta, { animate: false });
    }
}

function collectDirectionalSummaries(data, focusCountry, flowDir) {
    const srcKey = indicatorSourceKey();
    const partnerKey = flowDir === "imports" ? "region1" : "region2";
    const typeKey = "industry1";
    const flowMap = new Map();

    for (const row of data) {
        const partner = normalizeCode(row[partnerKey]);
        if (!partner || partner === focusCountry || !COORDS[partner]) continue;

        const metricValue = parseFloat(row[srcKey]) || 0;
        const amountValue = parseFloat(row.amount) || 0;
        if (metricValue <= 0 && amountValue <= 0) continue;

        const summary = getPartnerSummary(flowMap, partner);
        const typeCode = normalizeCode(row[typeKey]) || "UNKNOWN";

        summary.co2 += metricValue;
        summary.amount += amountValue;
        summary.rowCount += 1;

        if (!summary.typeMap.has(typeCode)) {
            summary.typeMap.set(typeCode, {
                code: typeCode,
                metricValue: 0,
                amountValue: 0,
            });
        }
        const current = summary.typeMap.get(typeCode);
        current.metricValue += metricValue;
        current.amountValue += amountValue;
    }

    flowMap.forEach(summary => prepareDirectionalSummary(summary));
    return flowMap;
}

function getCountryLabelText(flowDir) {
    if (flowDir === "exports") return "Exporting country:";
    if (flowDir === "balance") return "Balance country:";
    return "Importing country:";
}

function buildDirectionalTrades(flowMap, focusCountry, flowDir) {
    const topn = TradeShared.getState().topn;
    return Array.from(flowMap.values())
        .sort((a, b) => b.co2 - a.co2)
        .slice(0, topn)
        .map(summary => {
            const partner = summary.partner;
            const partnerLonShift = getPacificPartnerLonShift(focusCountry, partner);
            return {
                from: flowDir === "imports" ? partner : focusCountry,
                to: flowDir === "imports" ? focusCountry : partner,
                fromLonShift: flowDir === "imports" ? partnerLonShift : 0,
                toLonShift: flowDir === "exports" ? partnerLonShift : 0,
                co2: summary.co2,
                amount: summary.amount,
                topTypes: summary.topTypes,
                dominantType: summary.dominantType,
                dominantTypeLabel: summary.dominantTypeLabel,
                typeFamily: summary.typeFamily,
                partner,
            };
        });
}

function buildBalanceTrades(importsData, exportsData, focusCountry) {
    const importMap = collectDirectionalSummaries(importsData, focusCountry, "imports");
    const exportMap = collectDirectionalSummaries(exportsData, focusCountry, "exports");
    const partners = new Set([...importMap.keys(), ...exportMap.keys()]);
    const topn = TradeShared.getState().topn;

    return Array.from(partners)
        .map(partner => {
            const importsSummary = importMap.get(partner) || createPartnerSummary(partner);
            const exportsSummary = exportMap.get(partner) || createPartnerSummary(partner);
            const importsCo2 = importsSummary.co2 || 0;
            const exportsCo2 = exportsSummary.co2 || 0;
            const netCo2 = exportsCo2 - importsCo2;
            if (netCo2 === 0) return null;

            const partnerLonShift = getPacificPartnerLonShift(focusCountry, partner);
            const isSurplus = netCo2 > 0;
            const dominantSummary = isSurplus ? exportsSummary : importsSummary;
            prepareDirectionalSummary(importsSummary);
            prepareDirectionalSummary(exportsSummary);
            return {
                from: isSurplus ? focusCountry : partner,
                to: isSurplus ? partner : focusCountry,
                fromLonShift: isSurplus ? 0 : partnerLonShift,
                toLonShift: isSurplus ? partnerLonShift : 0,
                co2: Math.abs(netCo2),
                netCo2,
                importsCo2,
                exportsCo2,
                importsAmount: importsSummary.amount || 0,
                exportsAmount: exportsSummary.amount || 0,
                importTopTypes: importsSummary.topTypes || [],
                exportTopTypes: exportsSummary.topTypes || [],
                topTypes: dominantSummary.topTypes || [],
                dominantType: dominantSummary.dominantType || "",
                dominantTypeLabel: dominantSummary.dominantTypeLabel || "Mixed trade",
                typeFamily: dominantSummary.typeFamily || "mixed",
                balanceSign: isSurplus ? "positive" : "negative",
                partner,
            };
        })
        .filter(Boolean)
        .sort((a, b) => b.co2 - a.co2)
        .slice(0, topn);
}

function getWidthScale(trades) {
    const maxCO2 = d3.max(trades, d => d.co2) || 0;
    const minCO2 = d3.min(trades, d => d.co2) || 0;
    if (maxCO2 === minCO2) {
        return () => (maxCO2 > 0 ? 8 : 0);
    }
    return d3.scaleLinear()
        .domain([minCO2, maxCO2])
        .range([1.5, 14]);
}

function getBalanceColorScale(trades, sign) {
    const signedTrades = trades.filter(trade => trade.balanceSign === sign);
    const maxMagnitude = d3.max(signedTrades, d => d.co2) || 0;
    const darkColor = sign === "negative" ? BALANCE_NEGATIVE_DARK : BALANCE_POSITIVE_DARK;
    const lightColor = sign === "negative" ? BALANCE_NEGATIVE_LIGHT : BALANCE_POSITIVE_LIGHT;

    if (maxMagnitude <= 0) {
        return () => darkColor;
    }

    return magnitude => {
        const t = Math.max(0, Math.min(1, magnitude / maxMagnitude));
        return d3.interpolateRgb(darkColor, lightColor)(t);
    };
}

function getTradeTypeStyle(trade, flowDir, negativeBalanceColor, positiveBalanceColor) {
    const family = TYPE_STYLE_MAP[trade.typeFamily] || TYPE_STYLE_MAP.mixed;
    const accent = typeColorScale(trade.dominantType || trade.partner);
    const flowBaseColor = FLOW_BASE_COLORS[flowDir] || FLOW_BASE_COLORS.imports;
    const color = flowDir === "balance"
        ? (trade.balanceSign === "negative" ? negativeBalanceColor(trade.co2) : positiveBalanceColor(trade.co2))
        : d3.interpolateRgb(flowBaseColor, accent)(0.35);

    return {
        color,
        dasharray: family.dasharray,
        markerPath: family.markerPath,
        typeFamilyLabel: family.label,
        swatchStyle: family.swatchStyle,
    };
}

// ---------------------------------------------------------------------------
// Render arrows
// ---------------------------------------------------------------------------
function renderArrows(trades, focusCountry, flowDir) {
    g.selectAll("*").remove();
    svg.selectAll("defs").remove();

    if (trades.length === 0) return;

    const widthScale = getWidthScale(trades);
    const negativeBalanceColor = getBalanceColorScale(trades, "negative");
    const positiveBalanceColor = getBalanceColorScale(trades, "positive");

    // Single <defs> for all markers
    const defs = svg.append("defs");

    function bindArrowInteractions(selection, trade) {
        selection
            .on("mouseover", function(evt) {
                map.getContainer().style.cursor = "pointer";
                applyHighlight(trade.partner);
                showTooltip(trade, focusCountry, flowDir, evt);
            })
            .on("mousemove", function(evt) {
                moveTooltip(evt);
            })
            .on("mouseout", function() {
                map.getContainer().style.cursor = "";
                hideTooltip();
                selectedArrow ? applyHighlight(selectedArrow) : clearHighlight();
            })
            .on("click", function(evt) {
                if (evt && typeof evt.stopPropagation === "function") {
                    evt.stopPropagation();
                }
                if (selectedArrow === trade.partner) {
                    selectedArrow = null;
                    clearHighlight();
                } else {
                    selectedArrow = trade.partner;
                    applyHighlight(trade.partner);
                }
            });
    }

    trades.forEach((trade, i) => {
        const pathId   = `trade-path-${i}`;
        const markerId = `arrowhead-${i}`;
        const style    = getTradeTypeStyle(trade, flowDir, negativeBalanceColor, positiveBalanceColor);
        const color    = style.color;
        const sw       = widthScale(trade.co2);

        trade.strokeColor = color;
        trade.strokeDasharray = style.dasharray;
        trade.markerPath = style.markerPath;
        trade.typeFamilyLabel = style.typeFamilyLabel;
        trade.swatchStyle = style.swatchStyle;

        defs.append("marker")
            .attr("id", markerId)
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 10).attr("refY", 0)
            .attr("markerWidth", 5).attr("markerHeight", 5)
            .attr("orient", "auto")
            .append("path")
            .attr("d", trade.markerPath)
            .attr("fill", color)
            .attr("opacity", 0.7);

        const path = g.append("path")
            .datum(trade)
            .attr("id", pathId)
            .attr("class", `leaflet-interactive arrow arrow-${trade.partner}`)
            .attr("d", drawCurve(trade))
            .attr("stroke", color)
            .attr("stroke-width", sw)
            .attr("data-base-sw", sw)
            .attr("data-partner", trade.partner)
            .attr("stroke-dasharray", trade.strokeDasharray || null)
            .attr("marker-end", `url(#${markerId})`)
            .style("opacity", NORMAL_OPACITY);

        const hitPath = g.append("path")
            .datum(trade)
            .attr("class", `leaflet-interactive arrow-hit arrow-${trade.partner}`)
            .attr("d", drawCurve(trade))
            .attr("stroke-width", Math.max(14, sw + 10))
            .attr("data-base-sw", sw)
            .attr("data-partner", trade.partner)
            .style("opacity", 0.001);

        bindArrowInteractions(path, trade);
        bindArrowInteractions(hitPath, trade);

        const flipLabel = labelNeedsFlip(path.node());
        const labelPathId = `${pathId}-label`;

        g.append("path")
            .datum(trade)
            .attr("id", labelPathId)
            .attr("class", `label-path arrow-${trade.partner}`)
            .attr("d", drawLabelCurve(trade, flipLabel))
            .attr("fill", "none")
            .attr("stroke", "none")
            .attr("data-flip-label", flipLabel ? "true" : "false");

        g.append("text")
            .attr("class", `arrow-label arrow-${trade.partner}`)
            .append("textPath")
            .attr("xlink:href", `#${labelPathId}`)
            .attr("startOffset", flipLabel ? "58%" : "42%")
            .attr("class", "label-text")
            .attr("text-anchor", "middle")
            .text(trade.partner);
    });
}

function buildCheckboxes(trades, focusCountry, flowDir) {
    const container = document.getElementById("source-filters");
    container.innerHTML = "";
    if (trades.length === 0) return;

    const header = document.createElement("div");
    header.style.cssText = "font-size:11px;font-weight:600;margin-bottom:6px;color:#333;";
    header.textContent = flowDir === "imports"
        ? "Toggle exporters:"
        : flowDir === "exports"
            ? "Toggle importers:"
            : "Toggle balance partners:";
    container.appendChild(header);

        trades.forEach(trade => {
        const label    = document.createElement("label");
        const checkbox = document.createElement("input");
        const swatch   = document.createElement("span");
        const copy     = document.createElement("span");
        const name     = document.createElement("span");
        const meta     = document.createElement("span");
        checkbox.type    = "checkbox";
        checkbox.checked = true;
        checkbox.value   = trade.partner;
        label.dataset.partner = trade.partner;
        label.style.setProperty("--row-accent", trade.strokeColor || "#5b7cff");
        swatch.className = "filter-swatch";
        swatch.style.borderTopColor = trade.strokeColor || "#5b7cff";
        swatch.style.borderTopStyle = trade.swatchStyle || "solid";
        copy.className = "filter-copy";
        name.className = "filter-name";
        meta.className = "filter-meta";
        name.textContent = `${countryLabel(trade.partner)} (${trade.partner})`;
        meta.textContent = flowDir === "balance"
            ? `${trade.netCo2 >= 0 ? "Net exporter" : "Net importer"} | ${trade.dominantTypeLabel || "Mixed trade"} | ${fmtIndicator(trade.co2)}`
            : `${trade.dominantTypeLabel || "Mixed trade"} | ${fmtIndicator(trade.co2)} | ${fmtAmountValue(trade.amount || 0)}`;

        checkbox.addEventListener("change", function() {
            const vis = this.checked ? "visible" : "hidden";
            d3.selectAll(`.arrow-${trade.partner}`).attr("visibility", vis);
        });

        label.appendChild(checkbox);
        label.appendChild(swatch);
        copy.appendChild(name);
        copy.appendChild(meta);
        label.appendChild(copy);

        label.addEventListener("mouseenter", () => applyHighlight(trade.partner, { scroll: false }));
        label.addEventListener("mouseleave", () => {
            selectedArrow ? applyHighlight(selectedArrow) : clearHighlight();
        });

        container.appendChild(label);
    });
}

// ---------------------------------------------------------------------------
// Load CSV — with cache
// ---------------------------------------------------------------------------
function setStatus(msg) {
    document.getElementById("status-msg").textContent = msg;
}

function processAndRender(data, focusCountry, flowDir) {
    let trades = [];

    if (flowDir === "imports") {
        trades = buildDirectionalTrades(collectDirectionalSummaries(data, focusCountry, flowDir), focusCountry, flowDir);
    } else if (flowDir === "exports") {
        trades = buildDirectionalTrades(collectDirectionalSummaries(data, focusCountry, flowDir), focusCountry, flowDir);
    } else {
        trades = buildBalanceTrades(data.importsData, data.exportsData, focusCountry);
    }

    if (trades.length === 0) { setStatus("No data found."); return; }

    const arrow = flowDir === "imports"
        ? `${trades.length} exporters \u2192 ${countryLabel(focusCountry)}`
        : flowDir === "exports"
            ? `${countryLabel(focusCountry)} \u2192 ${trades.length} importers`
            : `${trades.filter(trade => trade.netCo2 > 0).length} surplus / ${trades.filter(trade => trade.netCo2 < 0).length} deficit partners`;
    setStatus(arrow);

    const legendDir = flowDir === "balance"
        ? "net exporter \u2192 net importer"
        : "exporter \u2192 importer";
    document.getElementById("legend-dir").textContent = legendDir;
    document.getElementById("legend-metric").textContent =
        "Arrow thickness = " + indicatorLabel() + " \u00B7 ";
    document.getElementById("legend-style").textContent = flowDir === "balance"
        ? "Green arrows show net export advantage, red arrows show net import dependence. Dash pattern still tracks the dominant industry family."
        : `Base color tracks ${flowDir === "imports" ? "imports" : "exports"}, while the tint and dash pattern reflect the dominant trade type.`;

    renderArrows(trades, focusCountry, flowDir);
    buildCheckboxes(trades, focusCountry, flowDir);
}

function fetchTradeCsv(focusCountry, flowDir) {
    const year = TradeShared.getState().year || "2022";
    const cacheKey = `${year}/${focusCountry}/${flowDir}`;
    if (csvCache.has(cacheKey)) {
        return Promise.resolve(csvCache.get(cacheKey));
    }

    const url = `https://raw.githubusercontent.com/ModelEarth/trade-data/main/year/${year}/${focusCountry}/${flowDir}/trade_impact.csv`;
    return d3.csv(url).then(function(data) {
        csvCache.set(cacheKey, data);
        return data;
    });
}

function loadFlows(focusCountry, flowDir) {
    const year = TradeShared.getState().year || "2022";
    currentFocusCountry = focusCountry;
    selectedArrow = null;
    hideTooltip();
    g.selectAll("*").remove();
    svg.selectAll("defs").remove();
    document.getElementById("source-filters").innerHTML = "";
    centerMapForCountry(focusCountry);

    setStatus("Loading\u2026");

    const loadRequest = flowDir === "balance"
        ? Promise.all([
            fetchTradeCsv(focusCountry, "imports"),
            fetchTradeCsv(focusCountry, "exports"),
        ]).then(function([importsData, exportsData]) {
            return { importsData, exportsData };
        })
        : fetchTradeCsv(focusCountry, flowDir);

    Promise.all([
        loadIndustryNamesForYear(year),
        loadRequest,
    ]).then(function([_, data]) {
        processAndRender(data, focusCountry, flowDir);
    }).catch(function(err) {
        setStatus("Error loading data.");
        console.error("Trade flow fetch failed:", err);
    });
}

// ---------------------------------------------------------------------------
// Country selector + flow direction toggle
// ---------------------------------------------------------------------------
document.getElementById("country-select").addEventListener("change", function() {
    syncCountryToHash(this.value);
    loadFlows(this.value, currentFlowDir);
});

document.querySelectorAll("input[name='flow-dir']").forEach(radio => {
    radio.addEventListener("change", function() {
        setFlowDirState(this.value);
        syncFlowDirToHash(currentFlowDir);
        loadFlows(document.getElementById("country-select").value, currentFlowDir);
    });
});

map.on("click", function(evt) {
    if (!clickShouldToggleZoom(evt)) return;
    setScrollZoom(!map.scrollWheelZoom.enabled());
});

map.on("resize", function() {
    centerMapForCountry(currentFocusCountry);
});

document.addEventListener("hashChangeEvent", function() {
    const hash = getHash();
    const nextCountry = getHashCountry() || getSelectedCountryValue();
    const nextFlowDir = getHashFlowDir() || currentFlowDir;
    const countryChanged = nextCountry !== currentFocusCountry;
    const flowChanged = nextFlowDir !== currentFlowDir;

    if (!countryChanged && !flowChanged) {
        return;
    }

    if (hash.country === window.priorHash?.country && hash.type === window.priorHash?.type) {
        return;
    }

    applySelections(nextCountry, nextFlowDir);
});

// Initialize shared trade controls
const _FACTOR_TO_METRIC = { co2: "CO2_total", water: "Water_total", emp: "Employment_total", amt: "amount" };
const _initHash = typeof getHash === 'function' ? getHash() : {};
const _initSaved = JSON.parse(localStorage.getItem('trade-map-state') || '{}');
const _initCurrency = _initHash.currency || localStorage.getItem('trade-currency') || 'EUR';
TradeShared.init({
    years: ["2022"],
    currencies: ["EUR"],
    initialState: {
        year: "2022",
        metric: _FACTOR_TO_METRIC[_initHash.factor || _initSaved.factor] || "CO2_total",
        currency: _initCurrency,
        topn: parseInt(_initHash.inflows, 10) || parseInt(_initSaved.inflows, 10) || 15
    }
});

// Load full currency list and rates once #trade-currency-select is in the DOM
waitForElm('#trade-currency-select').then(function() {
    d3.csv('https://raw.githubusercontent.com/ModelEarth/trade-data/refs/heads/main/concordance/eur_annual_rates.csv')
        .then(function(rows) {
            const cols = (rows.columns || []).filter(function(c) { return c !== 'Year'; });
            rows.forEach(function(row) {
                const yr = String(row.Year || '').trim();
                if (!yr) return;
                const rates = {};
                cols.forEach(function(c) {
                    const v = parseFloat(row[c]);
                    if (v > 0) rates[c] = v;
                });
                mapCurrencyRates[yr] = rates;
            });
            const codes = ['EUR'].concat(cols);
            TradeShared.setCurrencies(codes);
        })
        .catch(function() {});
});

// Reload map when shared state changes; sync currency to hash + localStorage
const _METRIC_TO_FACTOR = { CO2_total: "co2", Water_total: "water", Employment_total: "emp", amount: "amt" };
document.addEventListener("trade:change", function(evt) {
    const state = (evt && evt.detail) || TradeShared.getState();
    if (typeof updateHash === 'function') {
        updateHash({ currency: state.currency, factor: _METRIC_TO_FACTOR[state.metric] || state.metric });
    }
    localStorage.setItem('trade-currency', state.currency);
    localStorage.setItem('trade-map-state', JSON.stringify({
        factor: _METRIC_TO_FACTOR[state.metric] || state.metric,
        inflows: state.topn
    }));
    loadFlows(currentFocusCountry, currentFlowDir);
});

const initialFlowDir = getHashFlowDir() || getSelectedFlowDirValue();
const initialCountry = getHashCountry() || getSelectedCountryValue();
if (!applySelections(initialCountry, initialFlowDir)) {
    applySelections(getSelectedCountryValue(), getSelectedFlowDirValue());
}
syncCountryToHash(getSelectedCountryValue());
syncFlowDirToHash(currentFlowDir);
</script>

<div class="content contentpadding large-list">
  <div id="readmeDiv"></div>
</div>

</body>
