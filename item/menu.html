<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<link type="text/css" rel="stylesheet" href="../../localsite/css/base.css" id="/localsite/css/base.css" />
<script type="text/javascript" src="../../localsite/js/localsite.js?showheader=true"></script>

<link type="text/css" rel="stylesheet" href="css/label.css" />
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

<script>
document.addEventListener('hashChangeEvent', hashChangedMenu, false);
function hashChangedMenu() {
  console.log("Profile hash changed");
  loadMenu();
}
loadMenu();
</script>

<style>
.aggregate {
  float:right;
  min-width:260px;
  margin-left:20px;
}
.all-menu-items {
  overflow:auto;
  padding: 0px;
  margin: 0px;
}
.menu-label {
  min-width: 220px;
  max-width: 250px;
  float: left;
  padding: 0px;
  margin: 0px;
}
.category-item {
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 4px;
  background: #f5f5f5;
  font-size: 14px;
  transition: background 0.2s;
}
.category-item:hover {
  background: #e0e0e0;
}
.category-item.active {
  background: #4CAF50;
  color: white;
  font-weight: bold;
}
.dark .category-item {
  background: #334155;
  color: #f1f5f9;
}
.dark .category-item:hover {
  background: #475569;
}
.dark .category-item.active {
  background: #4CAF50;
  color: white;
}

/* 2-level menu styles */
#food-category-sidebar {
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.dark #food-category-sidebar {
  background: #1e293b;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.category-header {
  margin-bottom: 8px;
}

.category-title {
  width: 100%;
  background-color: #f9f9f9;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
  color: #333;
  transition: all 0.3s;
  text-align: left;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.category-title:hover {
  background-color: #e8f5e9;
  border-color: #4CAF50;
}

.category-title.active {
  background-color: #4CAF50;
  color: white;
  border-color: #4CAF50;
}

.dark .category-title {
  background-color: #334155;
  color: #f1f5f9;
  border-color: #475569;
}

.dark .category-title:hover {
  background-color: #475569;
  border-color: #4CAF50;
}

.dark .category-title.active {
  background-color: #4CAF50;
  color: white;
  border-color: #4CAF50;
}

.toggle-arrow {
  display: inline-block;
  transition: transform 0.3s;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}

.toggle-arrow.open {
  transform: rotate(90deg);
}

.subcategory-list {
  display: none;
  list-style: none;
  margin-top: 8px;
  margin-left: 0;
  padding-left: 15px;
  border-left: 2px solid #ddd;
}

.subcategory-list.open {
  display: block;
}

.dark .subcategory-list {
  border-left-color: #475569;
}

.subcategory-item {
  margin-bottom: 6px;
}

.subcategory-link {
  display: block;
  padding: 6px 10px;
  color: #666;
  text-decoration: none;
  font-size: 13px;
  border-radius: 3px;
  transition: all 0.3s;
  cursor: pointer;
}

.subcategory-link:hover {
  background-color: #f0f0f0;
  color: #333;
  padding-left: 15px;
}

.dark .subcategory-link {
  color: #cbd5e1;
}

.dark .subcategory-link:hover {
  background-color: #475569;
  color: #f1f5f9;
}
</style>

<script>
loadMarkdown("README.md", "readmeDiv", "_parent");
</script>

</head>

<body>
<div class="content contentpadding large-list" style="max-width: 1500px;">

  <p>Toggle between <a href="">Nutrition Layout</a> and <a href="#layout=product">Product Layout</a></p>

  <h1 id="page-header">Nutritious Meal Planner</h1>

  <div style="overflow: auto;">
    <div id="food-category-sidebar" style="float: left; width: 250px; margin-right: 20px; display: none;">
      <h3 style="margin-top: 0;">Food Categories</h3>
      <div id="category-list"></div>
    </div>
    <div style="overflow: auto;">
      <div id="usda-search-div"></div>
      <div id="search-results-container"></div>
      <div id="menu-container"></div>
      <div id="product-container"></div>
      <div id="product-label"></div>
    </div>
  </div>

  <br>
  <hr>
  <p><a href="index.html">About Profiles</a></p>

</div>
</body>
</html>
