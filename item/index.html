<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<title>Healthy Meal Planner</title>
<link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="text/javascript" src="../../localsite/js/jquery.min.js" id="/localsite/js/jquery.min.js"></script>
<link type="text/css" rel="stylesheet" href="../../localsite/css/base.css" id="/localsite/css/base.css" />
<script type="text/javascript" src="../../localsite/js/localsite.js?showheader=true"></script>

<link type="text/css" rel="stylesheet" href="css/label.css" />
<link type="text/css" rel="stylesheet" href="css/label-menu.css" />
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script type="text/javascript" src="js/shared.js"></script>
<script type="text/javascript" src="js/layout-product.js"></script>
<script type="text/javascript" src="js/label-product.js"></script>
<script type="text/javascript" src="js/label.js"></script>
<script>
document.addEventListener('hashChangeEvent', hashChangedMenu, false);
function hashChangedMenu(event) {
  console.log("Profile hash changed");
  loadMenu();
  // Don't update YAML source link here - wait for YAML to load
}
loadMenu();

// YAML Source link will be updated after YAML file is loaded with category from file
// Initialize wrapper as hidden on page load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    const wrapper = document.getElementById('yaml-source-wrapper');
    if (wrapper) wrapper.style.display = 'none';
  });
} else {
  const wrapper = document.getElementById('yaml-source-wrapper');
  if (wrapper) wrapper.style.display = 'none';
}

// Store the initial YAML source link to prevent it from changing when cat changes
let initialYAMLSource = null;

function updateYAMLSourceLink(categoryFromYAML) {
  const link = document.getElementById('yaml-source-link');
  const wrapper = document.getElementById('yaml-source-wrapper');

  if (!link || !wrapper) return;

  // Don't show the link if we don't have a category from the YAML
  if (!categoryFromYAML || typeof categoryFromYAML !== 'string') {
    wrapper.style.display = 'none';
    console.log("YAML Source hidden - waiting for category from YAML file");
    return;
  }

  const hash = (typeof getHash === "function") ? getHash() : getUrlHash();

  // Only show link if we have all required parameters
  if (hash.layout === "product" && hash.country && hash.id) {
    const category = categoryFromYAML.replace(/[^A-Za-z0-9]+/g, '_').replace(/^_+|_+$/g, '');

    // Create a unique key based on country and id (not cat, which can change)
    const sourceKey = `${hash.country}/${hash.id}`;

    // Only update if we don't have an initial source or if the product changed (different country or id)
    if (!initialYAMLSource || initialYAMLSource.key !== sourceKey) {
      // GitHub web view URL for better formatting
      const githubBase = "https://github.com/ModelEarth/products-data/blob/main";
      const yamlUrl = `${githubBase}/${hash.country}/${category}/${hash.id}.yaml`;

      initialYAMLSource = {
        key: sourceKey,
        url: yamlUrl,
        category: category
      };

      link.href = yamlUrl;
      console.log("YAML Source link set with category:", category, "URL:", yamlUrl);
    }

    wrapper.style.display = 'inline';
  } else {
    wrapper.style.display = 'none';
    console.log("YAML Source hidden - missing params:", hash);
  }
}

// Menu Set Management
const MENU_SETS_KEY = 'profile-menu-sets';
const CURRENT_MENU_KEY = 'profile-current-menu';

function getMenuSets() {
  const stored = localStorage.getItem(MENU_SETS_KEY);
  return stored ? JSON.parse(stored) : { 'menu-1': { name: 'Menu 1', items: [] } };
}

function saveMenuSets(sets) {
  localStorage.setItem(MENU_SETS_KEY, JSON.stringify(sets));
}

function getCurrentMenuId() {
  return localStorage.getItem(CURRENT_MENU_KEY) || 'menu-1';
}

function setCurrentMenuId(id) {
  localStorage.setItem(CURRENT_MENU_KEY, id);
}

function getCurrentMenu() {
  const sets = getMenuSets();
  const currentId = getCurrentMenuId();
  return sets[currentId] || { name: 'Menu 1', items: [] };
}

function saveCurrentMenuItems(items) {
  const sets = getMenuSets();
  const currentId = getCurrentMenuId();
  if (!sets[currentId]) {
    sets[currentId] = { name: 'Menu ' + (Object.keys(sets).length + 1), items: [] };
  }
  sets[currentId].items = items;
  saveMenuSets(sets);
}

function updateMenuSelector() {
  const selector = document.getElementById('menu-set-selector');
  if (!selector) return;

  const sets = getMenuSets();
  const currentId = getCurrentMenuId();

  // Clear and rebuild options
  selector.innerHTML = '';

  Object.keys(sets).forEach(id => {
    const option = document.createElement('option');
    option.value = id;
    option.textContent = sets[id].name;
    if (id === currentId) option.selected = true;
    selector.appendChild(option);
  });

  // Add "Add New Menu" option
  const addOption = document.createElement('option');
  addOption.value = 'add-new';
  addOption.textContent = '+ Add New Menu';
  selector.appendChild(addOption);
}

function handleMenuSelectorChange(event) {
  const value = event.target.value;

  if (value === 'add-new') {
    const name = prompt('Enter new menu name:');
    if (name) {
      const sets = getMenuSets();
      const newId = 'menu-' + Date.now();
      sets[newId] = { name: name, items: [] };
      saveMenuSets(sets);
      setCurrentMenuId(newId);
      updateMenuSelector();
      loadCurrentMenuItems();
    } else {
      // Restore previous selection
      event.target.value = getCurrentMenuId();
    }
  } else {
    setCurrentMenuId(value);
    loadCurrentMenuItems();
  }
}

function loadCurrentMenuItems() {
  const menu = getCurrentMenu();
  // Clear current display
  const menuContainer = document.getElementById('menu-container');
  if (menuContainer) {
    menuContainer.innerHTML = '';
  }

  // TODO: Reload menu items from menu.items array
  console.log('Loading menu items:', menu.items);
  checkMenuItemsDisplay();
}

function toggleMenuOptions() {
  const dropdown = document.getElementById('menu-options-dropdown');
  if (dropdown) {
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
  }
}

function editMenuDetails() {
  const sets = getMenuSets();
  const currentId = getCurrentMenuId();
  const currentMenu = sets[currentId];

  const newName = prompt('Enter menu name:', currentMenu.name);
  if (newName && newName !== currentMenu.name) {
    currentMenu.name = newName;
    saveMenuSets(sets);
    updateMenuSelector();
  }

  toggleMenuOptions();
}

function deleteCurrentMenu() {
  const sets = getMenuSets();
  const currentId = getCurrentMenuId();

  if (Object.keys(sets).length === 1) {
    alert('Cannot delete the last menu.');
    toggleMenuOptions();
    return;
  }

  if (confirm('Are you sure you want to delete "' + sets[currentId].name + '"?')) {
    delete sets[currentId];
    saveMenuSets(sets);

    // Switch to first available menu
    const firstId = Object.keys(sets)[0];
    setCurrentMenuId(firstId);
    updateMenuSelector();
    loadCurrentMenuItems();
  }

  toggleMenuOptions();
}

function checkMenuItemsDisplay() {
  const searchResults = document.getElementById('search-results-container');
  const menuContainer = document.getElementById('menu-container');

  if (!searchResults || !menuContainer) return;

  const hasMenuItems = menuContainer.children.length > 0 &&
                       menuContainer.querySelector('.menu-layout-wrapper, .menu-label, .aggregate');

  if (hasMenuItems) {
    searchResults.classList.remove('no-menu-items');
  } else {
    searchResults.classList.add('no-menu-items');
  }
}

// Initialize menu selector on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    updateMenuSelector();
    const selector = document.getElementById('menu-set-selector');
    if (selector) {
      selector.addEventListener('change', handleMenuSelectorChange);
    }
    checkMenuItemsDisplay();
    observeMenuChanges();
  });
} else {
  updateMenuSelector();
  const selector = document.getElementById('menu-set-selector');
  if (selector) {
    selector.addEventListener('change', handleMenuSelectorChange);
  }
  checkMenuItemsDisplay();
  observeMenuChanges();
}

// Observe menu container for changes to update search results width
function observeMenuChanges() {
  const menuContainer = document.getElementById('menu-container');
  if (!menuContainer) return;

  const observer = new MutationObserver(function() {
    checkMenuItemsDisplay();
  });

  observer.observe(menuContainer, {
    childList: true,
    subtree: true
  });
}

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
  const optionsBtn = document.getElementById('menu-options-btn');
  const dropdown = document.getElementById('menu-options-dropdown');

  if (dropdown && optionsBtn &&
      !optionsBtn.contains(event.target) &&
      !dropdown.contains(event.target)) {
    dropdown.style.display = 'none';
  }
});

function toggleCategorySidebar() {
  const sidebar = document.getElementById("category-sidebar");
  if (sidebar) {
    if (sidebar.style.display === "none" || sidebar.style.display === "") {
      // Showing sidebar - check which categories to load
      let hash = (typeof getHash === "function") ? getHash() : getUrlHash();
      if (hash.layout === "product") {
        if (typeof loadProductCategorySidebar === "function") {
          loadProductCategorySidebar();
        }
      } else {
        if (typeof loadFoodCategorySidebar === "function") {
          loadFoodCategorySidebar();
        }
      }
      sidebar.style.display = "block";
    } else {
      sidebar.style.display = "none";
    }
  }
}
</script>

</head>

<body>
<div class="content contentpadding large-list content-wide">

  <div class="header-row">
    <div class="header-left">
      <button id="menu-toggle-btn" class="menu-toggle-btn" onclick="toggleCategorySidebar()" title="Toggle categories menu">
        <i class="material-icons menu-icon">menu</i>
      </button>
      <div id="page-header"><b>Item Profiles:</b> <a href="">Healthy Meals</a> and <a href="#layout=product">Building Materials</a></div>
    </div>
    <div class="header-right">
      <select id="menu-set-selector" class="menu-set-selector">
        <option value="menu-1">Menu 1</option>
        <option value="add-new">+ Add New Menu</option>
      </select>
      <div id="menu-options-wrapper" class="menu-options-wrapper">
        <button id="menu-options-btn" class="menu-toggle-btn" onclick="toggleMenuOptions()" title="Menu options">
          <i class="material-icons menu-icon">more_vert</i>
        </button>
        <div id="menu-options-dropdown" class="menu-options-dropdown">
          <a href="#" onclick="editMenuDetails(); return false;" class="menu-options-link">Edit Menu Details</a>
          <a href="#" onclick="deleteCurrentMenu(); return false;" class="menu-options-link menu-options-link-delete">Delete Menu</a>
        </div>
      </div>
    </div>
  </div>

  <div class="content-scroll">
    <div id="category-sidebar" class="category-sidebar">
      <button class="close-sidebar-btn" onclick="toggleCategorySidebar()" title="Close categories menu">&times;</button>
      <div id="topic-select">
        <span id="topic-select-label">Food Categories</span>
        <span class="topic-select-arrow material-icons">keyboard_arrow_down</span>
        <div id="topic-select-dropdown" class="topic-select-dropdown">
          <a href="#" id="topic-food-link">Food Categories</a>
          <a href="#" id="topic-building-link">Building Materials</a>
          <a href="#" id="topic-close-link">Close Topic Menu</a>
        </div>
      </div>
      <div id="category-list"></div>
    </div>
    <div class="content-scroll">
      <div id="search-div"></div>
      <div id="search-results-container"></div>
      <div id="menu-container"></div>
      <div id="product-container"></div>
      <div id="product-label"></div>
    </div>
  </div>

  <br>
  <hr>
  <p><a href="../../products/">About Product Profiles</a><span id="yaml-source-wrapper"> | <a href="#" id="yaml-source-link" target="_blank">YAML Source</a></span></p>

</div>
</body>
</html>
